[workspace]
resolver = "2"
members = [
    "crates/docparse-core",
    "crates/docparse-pdf",
    "crates/docparse-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["docparse-rs contributors"]

# Centralized dependency versions — crates inherit via `dep.workspace = true`.
[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1"
lopdf = "0.41"
clap = { version = "4", features = ["derive"] }

[profile.release]
lto = "thin"
codegen-units = 1
