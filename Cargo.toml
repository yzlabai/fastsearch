[workspace]
resolver = "2"
exclude = ["fuzz"]
members = [
    "crates/docparse-core",
    "crates/docparse-pdf",
    "crates/docparse-docx",
    "crates/docparse-html",
    "crates/docparse-ocr",
    "crates/docparse-raster",
    "crates/docparse-vlm",
    "crates/docparse-xlsx",
    "crates/docparse-pptx",
    "crates/docparse-md",
    "crates/docparse-csv",
    "crates/docparse-srt",
    "crates/docparse-tex",
    "crates/docparse-eml",
    "crates/docparse-img",
    "crates/docparse-adoc",
    "crates/docparse-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["docparse-rs contributors"]

# Centralized dependency versions — crates inherit via `dep.workspace = true`.
[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1"
lopdf = "0.41"
clap = { version = "4", features = ["derive"] }
docx-rs = "0.4"
scraper = "0.21"
# REST face (N2b, user-approved 2026-06-10): axum/tokio kept to the features
# the server actually uses — no full-feature pull-in.
axum = { version = "0.8", features = ["multipart"] }
tokio = { version = "1", features = ["rt-multi-thread", "net"] }
# OCR enhancer (N3, P4 route): pure-Rust ONNX inference + JPEG decode.
tract-onnx = "0.23"
tract-linalg = { version = "0.23", features = ["multithread-mm"] }
zune-jpeg = "0.4"
zune-png = "0.4"
mail-parser = "0.9"
encoding_rs = "0.8"
chardetng = "0.1"
# On-demand page rasterization for neural enhancers (user-approved 2026-06-10):
# the main pipeline never renders; routed hard pages may, pure Rust, opt-in.
hayro = "0.7"
# VLM enhancer over OpenAI-compatible services (G8b, user-approved 2026-06-10).
ureq = { version = "2", features = ["json"] }
base64 = "0.22"
# Format breadth (G1a, user-approved 2026-06-10): XLSX/PPTX/Markdown backends.
calamine = "0.26"
quick-xml = "0.37"
zip = { version = "2", default-features = false, features = ["deflate"] }
pulldown-cmark = { version = "0.12", default-features = false }

[profile.release]
lto = "thin"
codegen-units = 1
