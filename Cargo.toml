[workspace]
resolver = "2"
members = [
    "crates/docparse-core",
    "crates/docparse-pdf",
    "crates/docparse-docx",
    "crates/docparse-html",
    "crates/docparse-ocr",
    "crates/docparse-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["docparse-rs contributors"]

# Centralized dependency versions — crates inherit via `dep.workspace = true`.
[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rayon = "1"
lopdf = "0.41"
clap = { version = "4", features = ["derive"] }
docx-rs = "0.4"
scraper = "0.21"
# REST face (N2b, user-approved 2026-06-10): axum/tokio kept to the features
# the server actually uses — no full-feature pull-in.
axum = { version = "0.8", features = ["multipart"] }
tokio = { version = "1", features = ["rt-multi-thread", "net"] }
# OCR enhancer (N3, P4 route): pure-Rust ONNX inference + JPEG decode.
tract-onnx = "0.21"
zune-jpeg = "0.4"

[profile.release]
lto = "thin"
codegen-units = 1
