[package]
name = "fastsearch-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "fastsearch command-line interface: ingest docparse chunks and search."

[[bin]]
name = "fastsearch"
path = "src/main.rs"

[lib]
name = "fastsearch_cli"
path = "src/lib.rs"

[dependencies]
fastsearch-core.workspace = true
fastsearch-engine.workspace = true
fastsearch-text.workspace = true
fastsearch-eval = { path = "../fastsearch-eval" }
clap.workspace = true
serde.workspace = true
serde_json.workspace = true
anyhow.workspace = true
# 解析（docparse-rs 融合 Option B：摄取热路径，feature 门控，搜索热路径零依赖）。
# C 预演阶段用本地兄弟仓路径依赖；subtree 收编后改 workspace 内 path（见 docparse 融合方案 §4）。
docparse-core = { path = "../../../docparse-rs/crates/docparse-core", optional = true }

[features]
# 开启 docparse 解析（无 ONNX/渲染）；默认不开，保持 CLI 精简。
parse = ["dep:docparse-core"]

[dev-dependencies]
tempfile.workspace = true
