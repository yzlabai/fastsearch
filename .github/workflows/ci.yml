name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fastsearch_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      # Postgres 用 docker run（非 services）才能传 `-c wal_level=logical`——CDC 集成测试
      # 需逻辑复制。仍只用 pgvector + 逻辑复制，不装任何需 shared_preload_libraries 的原生
      # 扩展（守住"托管 PG 可移植"硬约束 N1b）。
      - name: start postgres (pgvector + logical replication)
        run: |
          docker run -d --name pg \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=fastsearch_test \
            -p 5432:5432 \
            pgvector/pgvector:pg17 \
            -c wal_level=logical \
            -c max_replication_slots=8 \
            -c max_wal_senders=8
      - name: wait for postgres
        run: |
          for i in $(seq 1 30); do
            if docker exec pg pg_isready -U postgres >/dev/null 2>&1; then
              echo "postgres ready"; exit 0
            fi
            sleep 1
          done
          echo "postgres did not become ready" >&2; docker logs pg; exit 1

      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (zero warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      # 全量测试：含 PG 集成（DATABASE_URL）+ CDC 逻辑复制闭环 + eval 相关性回归门禁。
      - name: test (incl. PG integration + CDC + relevance gate)
        run: cargo test --workspace

  # 搜索热路径**零 docparse 依赖**硬门禁（不变量：解析能力 feature 门控、不进检索热路径）。
  # 故意往 server 加 docparse 依赖会让此 job 变红；移除即绿（守融合 Option B 的隔离约束）。
  hot-path-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: assert hot-path crates pull zero docparse
        run: |
          for c in fastsearch-server fastsearch-engine fastsearch-core fastsearch-text fastsearch-vector; do
            if cargo tree -p "$c" -e normal | grep -qi docparse; then
              echo "FAIL: $c 拉入了 docparse（搜索热路径必须零 docparse）" >&2
              cargo tree -p "$c" -e normal | grep -i docparse >&2
              exit 1
            fi
            echo "ok: $c 无 docparse"
          done

  # 解析分档（轻量，无 ONNX）：`parse` feature 对 vendored docparse 编译 + 单测绿。
  # parse-ocr/parse-tables（重 ONNX）需模型目录，CI 仅编译校验、运行测试 env-gated 跳过。
  parse-feature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: clippy (parse, zero warnings)
        run: cargo clippy -p fastsearch-cli --features parse --all-targets -- -D warnings
      - name: test (parse multiformat ingest)
        run: cargo test -p fastsearch-cli --features parse

  # CLI↔server 端到端：CLI 是 server 的 REST 客户端，此 job 守住其契约不漂移（无需 PG，
  # server 用内存/落盘派生索引 + dev key）。喂文件夹→检索 / stdin index→检索 全程经真 server。
  cli-server-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build server + cli
        run: cargo build -p fastsearch-server -p fastsearch-cli
      - name: e2e (feed folder → search; stdin index → search)
        run: |
          set -euo pipefail
          DOCS=$(mktemp -d)
          printf '# 财报\n\n本季度毛利率提升至百分之四十二。\n\n## 风险\n\n汇率波动是主要风险。\n' > "$DOCS/report.md"
          FASTSEARCH_DATA=$(mktemp -d) FASTSEARCH_KEYS="dev=:" \
            ./target/debug/fastsearch-server > /tmp/fss.log 2>&1 &
          SRV=$!; trap 'kill $SRV 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do curl -fsS http://127.0.0.1:8642/healthz >/dev/null 2>&1 && break; sleep 0.5; done
          U=http://127.0.0.1:8642
          ./target/debug/fastsearch index-dir --server $U --key dev --collection kb "$DOCS"
          ./target/debug/fastsearch search --server $U --key dev --collection kb --query "毛利率" --mode keyword --json | grep -q "report.md" \
            || { echo "FAIL: 喂文件夹后未检索到 report.md" >&2; cat /tmp/fss.log >&2; exit 1; }
          echo '[{"id":0,"kind":"paragraph","text":"独立 chunk alpha","page":1,"bbox":{"x0":0,"y0":0,"x1":1,"y1":1},"char_len":5}]' \
            | ./target/debug/fastsearch index --server $U --key dev --collection kb --doc-id manual -
          ./target/debug/fastsearch search --server $U --key dev --collection kb --query "alpha" --mode keyword --json | grep -q "kb:manual:0" \
            || { echo "FAIL: stdin index 后未检索到 manual" >&2; exit 1; }
          echo "cli-server-e2e OK"
