name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    # pgvector 镜像：仅用 pgvector + 逻辑复制，不装任何需 shared_preload_libraries 的扩展
    # （守住"托管 PG 可移植"硬约束 N1b）。
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fastsearch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/fastsearch_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (zero warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test (incl. PG integration via DATABASE_URL)
        run: cargo test --workspace
